# nginx front for the single-ECS deployment.
#
# Serves the built web SPA and reverse-proxies the backend API on ONE origin, so
# the browser makes same-origin calls (no CORS) and the app's Content-Security-
# Policy `connect-src 'self'` holds. The backend is NOT published to the host in
# docker-compose.prod.yml — it is reachable only here, over the compose network.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Chat attachments upload up to 25 MB (backend MAX_UPLOAD_SIZE_MB); allow a
    # little headroom for multipart overhead.
    client_max_body_size 30m;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Security headers — mirror web/vercel.json (step 41 hardening). Same-origin,
    # so connect-src 'self' covers the proxied API.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-Frame-Options "DENY" always;

    # Backend API prefixes (see backend/app/main.py include_router calls).
    # Regex group must list every top-level API prefix the SPA calls.
    location ~ ^/(auth|chats|documents|projects|skills|dashboards|artifacts|playbooks|agent|api|health)(/|$) {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Chat responses stream via SSE — disable buffering and allow long-lived
        # connections so tokens flush to the browser as they arrive.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # SPA: serve static assets, fall back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
